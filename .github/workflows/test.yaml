name: Test


on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]


jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install .[dev]

      - name: Test Code
        # Exit 5 = "no tests collected". The font_1d test suite lands
        # in a follow-up PR; until then, treat that as success.
        run: pytest signwriting_fonts || [ $? -eq 5 ]
